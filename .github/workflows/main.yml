name: Convert and Deploy Modified Sigma Rules

on:
  push:
    paths:
      - "rules/**.yml"
  pull_request:
    paths:
      - "rules/**.yml"
  workflow_dispatch:

# Belt-and-suspenders: even if the host pip config is missing, pip will
# still install on externally-managed Python 3.12 without erroring.
env:
  PIP_BREAK_SYSTEM_PACKAGES: "1"

jobs:
  # Step 1: Validate Sigma rules
  validate:
    runs-on: splunk-serv
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate Sigma rules
        uses: SigmaHQ/sigma-rules-validator@v1
        with:
          paths: |-
            ./rules
          schemaFile: ${{ github.workspace }}/sigma-schema.json

  # Step 2: Convert and deploy only changed rules
  convert-and-deploy:
    needs: validate
    runs-on: splunk-serv
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install sigma-cli requests
          sigma plugin install splunk

      - name: Find changed files
        id: changed-files
        run: |
          CHANGED_FILES=$(git diff --name-only HEAD^ HEAD -- rules/ | grep "\.yml$" || echo "")
          echo "Changed files:"
          echo "$CHANGED_FILES"
          {
            echo 'changed_files<<EOF'
            echo "$CHANGED_FILES"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Convert and deploy changed Sigma rules
        shell: bash
        env:
          SPLUNK_URL: ${{ secrets.SPLUNK_URL }}
          SPLUNK_TOKEN: ${{ secrets.SPLUNK_API_TOKEN }}
          CHANGED_FILES: ${{ steps.changed-files.outputs.changed_files }}
        run: |
          if [ -z "$CHANGED_FILES" ]; then
            echo "No Sigma rules were modified in this commit."
            exit 0
          fi

          success_count=0
          failure_count=0

          while IFS= read -r file; do
            [ -z "$file" ] && continue
            rule_name=$(basename "$file" .yml)
            echo "------------------------------------"
            echo "Processing $file (rule: $rule_name)"

            # Convert the rule to SPL (suppress stderr so it doesn't pollute the query)
            echo "Converting to Splunk SPL..."
            spl_query=$(sigma convert -t splunk -f default "$file" --without-pipeline 2>/dev/null)

            if [ -z "$spl_query" ]; then
              echo "× ERROR: Empty SPL query generated for $file"
              failure_count=$((failure_count + 1))
              continue
            fi

            echo "✓ SPL query generated successfully"

            echo "Deploying to Splunk..."
            if python scripts/deploy_to_splunk.py \
                --url "$SPLUNK_URL" \
                --token "$SPLUNK_TOKEN" \
                --rule "$rule_name" \
                --query "$spl_query" \
                --actions "log" --insecure \ 
                 ; then
              echo "✓ Rule deployed successfully to Splunk"
              success_count=$((success_count + 1))
            else
              echo "× ERROR: Failed to deploy rule to Splunk"
              failure_count=$((failure_count + 1))
            fi

            echo "------------------------------------"
          done <<< "$CHANGED_FILES"

          echo "Conversion and deployment complete:"
          echo "Success: $success_count rules"
          echo "Failures: $failure_count rules"

          exit 0
